name: Translation sync

on:
    schedule:
        -   cron: '0 6 * * *'
    workflow_dispatch: {}

jobs:
    sync:
        if: ${{ github.repository_owner == 'consulo' }}
        permissions:
            contents: write
            pull-requests: write
        uses: consulo/shared-workflows/.github/workflows/translation-sync.yml@master
        secrets: inherit
