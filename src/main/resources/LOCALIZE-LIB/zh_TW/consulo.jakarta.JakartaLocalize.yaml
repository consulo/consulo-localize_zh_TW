libraries.node.text.application.server:
    text: 庫包含將各種功能添加到您的應用程式的類。庫還包含源文件和 JavaDoc，它們可以幫助您開發專案。<br><br>IntelliJ IDEA 使用庫協助您完成程式碼補全、驗證、錯誤高亮顯示等。<br><br>應用程式伺服器庫是應用程式伺服器 (WebSphere、WebLogic、Tomcat 等) 的一部分並適用於通過這些伺服器設定的 Web 和 Java EE 套用程序。<br><br>擴展節點和選擇子項以管理您的系統中安裝的應用程式伺服器庫。<br><br>要將庫附加到模組，請選擇該模組，點擊“依賴關係”頁籤，點擊“添加”並指定庫位置。
