libraries.node.text.ide:
    text: 庫包含可以將各種功能新增到應用程式的類別。庫還包括可以協助您開發項目的來源檔案和 JavaDoc。<br><br> IntelliJ IDEA 使用庫來協助您完成代碼，驗證，錯誤高亮等。<br><br>全局庫可以在整個項目參照，並可以在所有模組中使用。此外，它們可用於在您的計算機上本機建立的所有項目。<br><br>請注意，全局庫不可用於與您共用項目的任何人。如果您與團隊共用項目，請改用項目庫。<br><br>展開節點並選取子項以管理全局庫。<br><br>要將庫附加到模組，請選取該模組，點擊「依賴關係」選項卡，點擊「新增」並指定庫位置。
libraries.node.text.module:
    text: 庫包含可以將各種功能新增到應用程式的類別。庫還包括可以協助您開發項目的來源檔案和 JavaDoc。<br><br> IntelliJ IDEA 使用庫來協助您完成代碼，驗證，錯誤高亮等。<br><br>模組庫僅從他們附加的模組參照。展開節點並選取子項目以管理項目庫。<br><br>要將庫附加到模組，請選取該模組，點擊依賴關係選項卡，點擊新增並指定庫位置。
libraries.node.text.project:
    text: 庫包含可以將各種功能新增到應用程式的類別。庫還包括可以協助您開發項目的來源檔案和 JavaDoc。<br><br> IntelliJ IDEA 使用庫來協助您完成代碼，驗證，錯誤高亮等。<br><br>項目庫可以在整個項目參照，並可以在所有模組中使用。此外，它們可以與您共用項目的每個人一起使用。<br><br>展開節點並選取子項目以管理項目庫。<br><br>要將庫附加到模組，請選取該模組，點擊依賴關係選項卡，點擊新增並指定庫位置。
